version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: servlets_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  tomcat:
    image: tomcat:9-jdk11
    container_name: tomcat_app
    ports:
      - "8080:8080"
    volumes:
      - ./app/target/app.war:/usr/local/tomcat/webapps/app.war
    depends_on:
      - mysql

volumes:
  mysql_data:
